<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanMind AI — Smart City Expansion Planner</title>
    <meta name="description" content="AI-powered smart city expansion planning simulation" />
  </head>
  <body>
    <div id="boot-status" style="position:fixed;top:10px;left:10px;z-index:999999;background:#131929;color:#e2e8f0;border:1px solid #2d4a7a;border-radius:6px;padding:8px 12px;font:12px/1.5 system-ui,sans-serif;max-width:480px;word-break:break-all">
      UrbanMind loading...
    </div>
    <div id="root"></div>
    <script>
      var bootEl = document.getElementById('boot-status')
      var _crashed = false

      function showError(msg) {
        _crashed = true
        if (bootEl) {
          bootEl.style.borderColor = '#ef4444'
          bootEl.style.color = '#fecaca'
          bootEl.style.background = '#1a0a0a'
          bootEl.style.fontSize = '11px'
          bootEl.innerHTML = '<b style="font-size:13px">Startup crash</b><br>' + msg
        }
      }

      window.addEventListener('error', function (e) {
        showError((e.message || 'unknown') + (e.filename ? '<br>' + e.filename + ':' + e.lineno : ''))
      })
      window.addEventListener('unhandledrejection', function (e) {
        showError((e.reason && e.reason.message) || String(e.reason) || 'promise failed')
      })

      // Only remove the badge if the app actually mounted (React will call this)
      window.__urbanmind_ready = function () {
        if (!_crashed && bootEl) {
          setTimeout(function() { bootEl && bootEl.remove() }, 1500)
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
