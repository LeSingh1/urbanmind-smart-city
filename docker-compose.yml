version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: urbanmind-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    depends_on:
      - api
    networks:
      - urbanmind

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: urbanmind-api
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ai_engine:/app/ai_engine
      - ./data:/app/data
    networks:
      - urbanmind

  worker:
    image: urbanmind-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker.worker
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ai_engine:/app/ai_engine
      - ./data:/app/data
    networks:
      - urbanmind

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: urbanmind
      POSTGRES_USER: urbanmind
      POSTGRES_PASSWORD: urbanmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanmind -d urbanmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urbanmind

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - urbanmind

  nginx:
    image: nginx:1.26-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - api
    networks:
      - urbanmind

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - urbanmind

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_cache:
  frontend_node_modules:

networks:
  urbanmind:
    driver: bridge
